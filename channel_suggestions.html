<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📌 everypace 채널 제안 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #f7f7f7; color: #2d2d2d; line-height: 1.7; font-size: 15px; }
  .container { max-width: 780px; margin: 0 auto; padding: 36px 20px 80px; }

  .header { background: linear-gradient(135deg, #4a9a6a 0%, #2e7d50 100%); border-radius: 14px; padding: 30px 28px; margin-bottom: 24px; color: #fff; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { font-size: 13px; opacity: 0.82; }
  .header-stats { display: flex; gap: 16px; }
  .stat { text-align: center; background: rgba(255,255,255,0.18); border-radius: 10px; padding: 8px 16px; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; opacity: 0.85; }

  .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .tab-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid #e0e0e0; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; color: #888; transition: all 0.18s; }
  .tab-btn.active { border-color: #4a9a6a; background: #4a9a6a; color: #fff; }
  .tab-btn:hover:not(.active) { border-color: #b0b0b0; color: #555; }

  .section { display: none; }
  .section.active { display: block; }

  .card { background: #fff; border-radius: 12px; border: 1.5px solid #e8e8e8; padding: 20px 22px; margin-bottom: 12px; transition: box-shadow 0.18s; }
  .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,0.07); }
  .card.status-added { border-color: #a8d8b8; background: #f8fdf9; }
  .card.status-dropped { border-color: #e0e0e0; background: #fafafa; opacity: 0.6; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 12px; }
  .card-left { flex: 1; min-width: 0; }
  .card-username { font-size: 16px; font-weight: 700; color: #1a1a1a; margin-bottom: 3px; }
  .card-username a { color: #4a9a6a; text-decoration: none; }
  .card-username a:hover { text-decoration: underline; }
  .card-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 10px; border-radius: 10px; white-space: nowrap; }
  .badge-category { background: #e8f5ee; color: #2e7d50; }
  .badge-date { background: #f0f0f0; color: #888; }
  .badge-status-pending { background: #fff3e0; color: #e07000; }
  .badge-status-added { background: #e8f5ee; color: #2e7d50; }
  .badge-status-dropped { background: #f5f5f5; color: #aaa; }

  .card-reason { font-size: 13px; color: #555; background: #f7f7f7; border-left: 3px solid #4a9a6a; padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 10px 0 14px; line-height: 1.6; }
  .card.status-dropped .card-reason { border-left-color: #ccc; }

  .card-actions { display: flex; gap: 8px; }
  .btn { padding: 7px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-add { background: #4a9a6a; color: #fff; }
  .btn-add:hover { background: #3a8a5a; }
  .btn-add.active { background: #2e7d50; box-shadow: 0 0 0 3px rgba(74,154,106,0.25); }
  .btn-drop { background: #f5f5f5; color: #888; border: 1.5px solid #e0e0e0; }
  .btn-drop:hover { background: #ffe5e5; color: #c0392b; border-color: #f0aaaa; }
  .btn-drop.active { background: #fdecea; color: #c0392b; border-color: #f0aaaa; box-shadow: 0 0 0 3px rgba(192,57,43,0.12); }
  .btn-undo { background: #f0f0f0; color: #666; font-size: 12px; padding: 6px 14px; }
  .btn-undo:hover { background: #e0e0e0; }

  .empty-state { text-align: center; padding: 52px 20px; color: #b0b0b0; }
  .empty-state .emoji { font-size: 36px; margin-bottom: 10px; }
  .empty-state p { font-size: 14px; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 11px 22px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }

  .apply-bar { position: sticky; bottom: 0; background: rgba(255,255,255,0.96); backdrop-filter: blur(8px); border-top: 1px solid #e8e8e8; padding: 14px 0; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
  .apply-info { font-size: 13px; color: #666; }
  .apply-info strong { color: #1a1a1a; }
  .btn-apply { background: #4a9a6a; color: #fff; padding: 10px 24px; border-radius: 10px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-apply:hover { background: #3a8a5a; }
  .btn-apply:disabled { background: #ccc; cursor: default; }

  .apply-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .apply-modal.open { display: flex; }
  .modal-box { background: #fff; border-radius: 16px; padding: 28px; max-width: 520px; width: 90%; }
  .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .modal-box p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.6; }
  .cmd-block { background: #1a1a1a; color: #7ec89a; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; padding: 14px 16px; border-radius: 8px; margin-bottom: 14px; white-space: pre-wrap; word-break: break-all; line-height: 1.8; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-copy { background: #4a9a6a; color: #fff; padding: 9px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-close { background: #f0f0f0; color: #666; padding: 9px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }

  .footer { text-align: center; padding-top: 28px; border-top: 1px solid #eee; margin-top: 16px; }
  .footer p { font-size: 12px; color: #b8b8b8; }
  .footer a { color: #4a9a6a; text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>📌 everypace 채널 제안 관리</h1>
      <div class="subtitle">매일 자동 제안 · 추가 또는 드랍으로 channels.json 업데이트</div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-num" id="statPending">-</div><div class="stat-label">대기중</div></div>
      <div class="stat"><div class="stat-num" id="statAdded">-</div><div class="stat-label">추가됨</div></div>
      <div class="stat"><div class="stat-num" id="statDropped">-</div><div class="stat-label">드랍됨</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('pending')">🟡 대기중 <span id="tabPendingCount"></span></button>
    <button class="tab-btn" onclick="switchTab('added')">✅ 추가됨 <span id="tabAddedCount"></span></button>
    <button class="tab-btn" onclick="switchTab('dropped')">❌ 드랍됨 <span id="tabDroppedCount"></span></button>
    <button class="tab-btn" onclick="switchTab('all')">📋 전체</button>
  </div>

  <div id="section-pending" class="section active"></div>
  <div id="section-added" class="section"></div>
  <div id="section-dropped" class="section"></div>
  <div id="section-all" class="section"></div>

  <div class="apply-bar">
    <div class="apply-info">결정된 항목: <strong id="decidedCount">0</strong>개 · Claude에게 적용을 요청하거나 명령어를 복사하세요.</div>
    <button class="btn-apply" id="applyBtn" onclick="openApplyModal()" disabled>적용 명령어 보기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="apply-modal" id="applyModal">
  <div class="modal-box">
    <h3>🛠 channels.json 적용 명령어</h3>
    <p>아래 명령어를 터미널에서 실행하거나, Claude에게 "이 명령어 실행해줘"라고 전달하세요.</p>
    <div class="cmd-block" id="cmdBlock"></div>
    <div class="modal-actions">
      <button class="btn-copy" onclick="copyCmd()">📋 복사</button>
      <button class="btn-close" onclick="closeApplyModal()">닫기</button>
    </div>
  </div>
</div>

<script>
// ── 데이터: 매일 자동 업데이트 ─────────────────────────────────
const SUGGESTIONS = [
  {
    "username": "runninglife_korea",
    "category": "러닝",
    "reason": "러닝 전문 매거진 RIFE, 팔로워 67K. 국내 러닝 정보·트레이닝 팁 심층 커버 — 현재 등록된 @cr8tour와 시너지 높음.",
    "url": "https://www.instagram.com/runninglife_korea/",
    "suggested_date": "2026-04-10",
    "status": "pending"
  },
  {
    "username": "runners_now",
    "category": "러닝",
    "reason": "러너스나우 한국 마라톤 정보 전문 채널. 국내 대회 일정·훈련 정보 특화 — everypace 독자의 실제 니즈와 직결되는 소재 공급처.",
    "url": "https://www.instagram.com/runners_now/",
    "suggested_date": "2026-04-10",
    "status": "pending"
  },
  {
    "username": "marathon.nutritionist",
    "category": "러닝/영양",
    "reason": "마라톤 전문 영양사 Kristy Baumann. 68K 팔로워. 연료 보충·레이스 영양·언더퓨얼링 예방 콘텐츠 전문. fastpace. 시리즈와 시너지 높음.",
    "url": "https://www.instagram.com/marathon.nutritionist/",
    "suggested_date": "2026-04-11",
    "status": "pending"
  },
  {
    "username": "runningchannel",
    "category": "러닝",
    "reason": "160K 팔로워. 러닝 팁·뉴스·동기부여 콘텐츠 전문. 영어권 러닝 트렌드와 글로벌 레이스 소식 수집에 유용. 다양한 거리·레벨 러너 대상 콘텐츠 풍부.",
    "url": "https://www.instagram.com/runningchannel/",
    "suggested_date": "2026-04-11",
    "status": "pending"
  },
  {
    "username": "strengthrunning",
    "category": "러닝 코칭",
    "reason": "Jason Fitzgerald의 러닝 코칭 계정 — 부상 예방, 훈련 계획, 스마트 러닝 팁 중심. 런갤 '기록 향상법·부상 예방' 주제와 직결. 실용적 러닝 정보 커버 가능.",
    "url": "https://www.instagram.com/strengthrunning/",
    "suggested_date": "2026-04-13",
    "status": "pending"
  },
  {
    "username": "drmarkhyman",
    "category": "기능의학/영양",
    "reason": "기능의학 전문가 Mark Hyman MD — 음식·영양·노화 방지 관련 데이터 기반 콘텐츠. '러너들에게 최악의 음료' 같은 영양 소재를 꾸준히 발굴 가능. nutritionfacts보다 SNS 친화적 포맷.",
    "url": "https://www.instagram.com/drmarkhyman/",
    "suggested_date": "2026-04-13",
    "status": "added"
  },
  {
    "username": "hubermanlab",
    "category": "웰니스/과학",
    "reason": "스탠퍼드 신경과학자 Andrew Huberman. 수면·스트레스·운동 퍼포먼스를 데이터로 설명. fastpace. 시리즈 소재 금광. 팔로워 5.7M.",
    "url": "https://www.instagram.com/hubermanlab/",
    "suggested_date": "2026-04-14",
    "status": "added"
  },
  {
    "username": "mattdavella",
    "category": "라이프스타일/습관",
    "reason": "미니멀리즘·습관 형성·의도적 삶 설계 전문. 달리기를 루틴으로 만드는 기획 소재로 활용 가능. everypace 톤과 잘 맞는 담백한 비주얼. 팔로워 1.4M.",
    "url": "https://www.instagram.com/mattdavella/",
    "suggested_date": "2026-04-14",
    "status": "pending"
  },
  {
    "username": "jayshetty",
    "category": "자기계발",
    "reason": "19M 팔로워. 습관·마인드셋·인생 철학 콘텐츠. 러닝과 자기계발 연결 소재 풍부",
    "url": "https://www.instagram.com/jayshetty/",
    "suggested_date": "2026-04-15",
    "status": "pending"
  },
  {
    "username": "thesleepdoctor",
    "category": "수면건강",
    "reason": "수면 전문가 Michael Breus. 수면이 운동 퍼포먼스·회복에 미치는 영향 소재 풍부",
    "url": "https://www.instagram.com/thesleepdoctor/",
    "suggested_date": "2026-04-15",
    "status": "pending"
  }
];

const STORAGE_KEY = 'ep_channel_decisions';
const TABS = ['pending', 'added', 'dropped', 'all'];
let activeTab = 'pending';

// 결정 상태 로드 (localStorage)
function loadDecisions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveDecisions(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

function getStatus(username) {
  const d = loadDecisions();
  return d[username] || 'pending';
}
function setStatus(username, status) {
  const d = loadDecisions();
  if (status === 'pending') delete d[username];
  else d[username] = status;
  saveDecisions(d);
}

function renderAll() {
  const decisions = loadDecisions();
  const grouped = { pending: [], added: [], dropped: [] };
  SUGGESTIONS.forEach(s => {
    const status = decisions[s.username] || 'pending';
    grouped[status].push({ ...s, status });
  });

  // Stats
  document.getElementById('statPending').textContent = grouped.pending.length;
  document.getElementById('statAdded').textContent = grouped.added.length;
  document.getElementById('statDropped').textContent = grouped.dropped.length;
  document.getElementById('tabPendingCount').textContent = grouped.pending.length > 0 ? `(${grouped.pending.length})` : '';
  document.getElementById('tabAddedCount').textContent = grouped.added.length > 0 ? `(${grouped.added.length})` : '';
  document.getElementById('tabDroppedCount').textContent = grouped.dropped.length > 0 ? `(${grouped.dropped.length})` : '';

  const decided = grouped.added.length + grouped.dropped.length;
  document.getElementById('decidedCount').textContent = decided;
  document.getElementById('applyBtn').disabled = decided === 0;

  // Render sections
  const allItems = [...grouped.pending, ...grouped.added, ...grouped.dropped];
  renderSection('pending', grouped.pending);
  renderSection('added', grouped.added);
  renderSection('dropped', grouped.dropped);
  renderSection('all', allItems);
}

function renderSection(tab, items) {
  const el = document.getElementById('section-' + tab);
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">${tab === 'pending' ? '🎉' : tab === 'added' ? '📭' : tab === 'dropped' ? '🗑' : '📭'}</div><p>${tab === 'pending' ? '대기 중인 제안이 없습니다.' : tab === 'added' ? '추가된 채널이 없습니다.' : tab === 'dropped' ? '드랍된 채널이 없습니다.' : '제안이 없습니다.'}</p></div>`;
    return;
  }
  el.innerHTML = items.map(s => buildCard(s)).join('');
}

function buildCard(s) {
  const statusLabel = s.status === 'added' ? '✅ 추가됨' : s.status === 'dropped' ? '❌ 드랍됨' : '🟡 대기중';
  const statusBadge = `badge-status-${s.status}`;
  const addActive = s.status === 'added' ? 'active' : '';
  const dropActive = s.status === 'dropped' ? 'active' : '';
  return `
<div class="card status-${s.status}" id="card-${s.username}">
  <div class="card-header">
    <div class="card-left">
      <div class="card-username"><a href="${s.url}" target="_blank">@${s.username}</a></div>
      <div class="card-meta">
        <span class="badge badge-category">${s.category}</span>
        <span class="badge badge-date">📅 ${s.suggested_date}</span>
        <span class="badge ${statusBadge}">${statusLabel}</span>
      </div>
    </div>
  </div>
  <div class="card-reason">${s.reason}</div>
  <div class="card-actions">
    <button class="btn btn-add ${addActive}" onclick="decide('${s.username}', 'added')">✅ 추가</button>
    <button class="btn btn-drop ${dropActive}" onclick="decide('${s.username}', 'dropped')">❌ 드랍</button>
    ${s.status !== 'pending' ? `<button class="btn btn-undo" onclick="decide('${s.username}', 'pending')">↩ 되돌리기</button>` : ''}
  </div>
</div>`;
}

function decide(username, status) {
  // Toggle: if already this status → undo to pending
  const current = getStatus(username);
  if (current === status) setStatus(username, 'pending');
  else setStatus(username, status);
  renderAll();
  // Re-render active tab
  switchTab(activeTab, false);
  showToast(status === 'pending' ? '↩ 되돌렸습니다' : status === 'added' ? '✅ 추가로 표시됨' : '❌ 드랍으로 표시됨');
}

function switchTab(tab, updateActive = true) {
  activeTab = tab;
  TABS.forEach(t => {
    document.getElementById('section-' + t).classList.toggle('active', t === tab);
  });
  if (updateActive) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TABS[i] === tab);
    });
  } else {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TABS[i] === tab);
    });
  }
}

function openApplyModal() {
  const decisions = loadDecisions();
  const toAdd = SUGGESTIONS.filter(s => decisions[s.username] === 'added');
  const toDrop = SUGGESTIONS.filter(s => decisions[s.username] === 'dropped');

  let cmds = [];
  if (toAdd.length) {
    cmds.push('# ✅ 추가할 채널');
    toAdd.forEach(s => {
      const cat = s.category.split('/')[0];
      cmds.push(`python3 scan_channels.py --add ${s.username} "${cat}"`);
    });
  }
  if (toDrop.length) {
    cmds.push('\n# ❌ 드랍 (비활성화)할 채널');
    toDrop.forEach(s => {
      cmds.push(`python3 scan_channels.py --remove ${s.username}`);
    });
  }

  document.getElementById('cmdBlock').textContent = cmds.join('\n');
  document.getElementById('applyModal').classList.add('open');
}

function closeApplyModal() {
  document.getElementById('applyModal').classList.remove('open');
}

function copyCmd() {
  const text = document.getElementById('cmdBlock').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('📋 복사됨!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Close modal on backdrop click
document.getElementById('applyModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeApplyModal();
});

// Init
renderAll();
</script>

<div class="footer">
  <p>
    <a href="https://contentsteamharuna.github.io/haruna-daily-insights/">← 데일리 리포트 홈</a>
    &nbsp;·&nbsp; Generated by everypace automation · sofit
  </p>
</div>

</div>
</body>
</html>
