const STORAGE_KEY = 'ep_channel_decisions';
const TABS = ['pending', 'added', 'dropped', 'all'];
let activeTab = 'pending';

// 결정 상태 로드 (localStorage)
function loadDecisions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}
function saveDecisions(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }

// 이미 채널 목록에 있는 채널은 자동으로 'added'로 처리
const CURRENT_CHANNEL_SET = new Set(CURRENT_CHANNELS.map(c => c.username));

function getStatus(username) {
  if (CURRENT_CHANNEL_SET.has(username)) return 'added';
  const d = loadDecisions();
  return d[username] || 'pending';
}
function setStatus(username, status) {
  if (CURRENT_CHANNEL_SET.has(username)) return; // 이미 스캔 중인 채널은 변경 불가
  const d = loadDecisions();
  if (status === 'pending') delete d[username];
  else d[username] = status;
  saveDecisions(d);
}

function renderAll() {
  const decisions = loadDecisions();
  const grouped = { pending: [], added: [], dropped: [] };
  SUGGESTIONS.forEach(s => {
    const status = decisions[s.username] || 'pending';
    grouped[status].push({ ...s, status });
  });

  // Stats
  document.getElementById('statPending').textContent = grouped.pending.length;
  document.getElementById('statAdded').textContent = grouped.added.length;
  document.getElementById('statDropped').textContent = grouped.dropped.length;
  document.getElementById('tabPendingCount').textContent = grouped.pending.length > 0 ? `(${grouped.pending.length})` : '';
  document.getElementById('tabAddedCount').textContent = grouped.added.length > 0 ? `(${grouped.added.length})` : '';
  document.getElementById('tabDroppedCount').textContent = grouped.dropped.length > 0 ? `(${grouped.dropped.length})` : '';

  const decided = grouped.added.length + grouped.dropped.length;
  document.getElementById('decidedCount').textContent = decided;
  document.getElementById('applyBtn').disabled = decided === 0;

  // Render sections
  const allItems = [...grouped.pending, ...grouped.added, ...grouped.dropped];
  renderSection('pending', grouped.pending);
  renderSection('added', grouped.added);
  renderSection('dropped', grouped.dropped);
  renderSection('all', allItems);
}

function renderSection(tab, items) {
  const el = document.getElementById('section-' + tab);
  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">${tab === 'pending' ? '🎉' : tab === 'added' ? '📭' : tab === 'dropped' ? '🗑' : '📭'}</div><p>${tab === 'pending' ? '대기 중인 제안이 없습니다.' : tab === 'added' ? '추가된 채널이 없습니다.' : tab === 'dropped' ? '드랍된 채널이 없습니다.' : '제안이 없습니다.'}</p></div>`;
    return;
  }
  el.innerHTML = items.map(s => buildCard(s)).join('');
}

function buildCard(s) {
  const isScanning = CURRENT_CHANNEL_SET.has(s.username);
  const statusLabel = isScanning ? '📡 스캔 중' : s.status === 'added' ? '✅ 추가됨' : s.status === 'dropped' ? '❌ 드랍됨' : '🟡 대기중';
  const statusBadge = isScanning ? 'badge-status-added' : `badge-status-${s.status}`;
  const addActive = s.status === 'added' ? 'active' : '';
  const dropActive = s.status === 'dropped' ? 'active' : '';
  const actionsHtml = isScanning
    ? `<span style="font-size:12px;color:#4a9a6a;font-weight:600;">📡 이미 스캔 채널에 포함되어 있습니다</span>`
    : `<button class="btn btn-add ${addActive}" onclick="decide('${s.username}', 'added')">✅ 추가</button>
       <button class="btn btn-drop ${dropActive}" onclick="decide('${s.username}', 'dropped')">❌ 드랍</button>
       ${s.status !== 'pending' ? `<button class="btn btn-undo" onclick="decide('${s.username}', 'pending')">↩ 되돌리기</button>` : ''}`;
  return `
<div class="card status-${s.status}" id="card-${s.username}" style="${isScanning ? 'opacity:0.7;' : ''}">
  <div class="card-header">
    <div class="card-left">
      <div class="card-username"><a href="${s.url}" target="_blank">@${s.username}</a></div>
      <div class="card-meta">
        <span class="badge badge-category">${s.category}</span>
        <span class="badge badge-date">📅 ${s.suggested_date}</span>
        <span class="badge ${statusBadge}">${statusLabel}</span>
      </div>
    </div>
  </div>
  <div class="card-reason">${s.reason}</div>
  <div class="card-actions">${actionsHtml}</div>
</div>`;
}

function decide(username, status) {
  // Toggle: if already this status → undo to pending
  const current = getStatus(username);
  if (current === status) setStatus(username, 'pending');
  else setStatus(username, status);
  renderAll();
  // Re-render active tab
  switchTab(activeTab, false);
  showToast(status === 'pending' ? '↩ 되돌렸습니다' : status === 'added' ? '✅ 추가로 표시됨' : '❌ 드랍으로 표시됨');
}

function switchTab(tab, updateActive = true) {
  activeTab = tab;
  TABS.forEach(t => {
    document.getElementById('section-' + t).classList.toggle('active', t === tab);
  });
  if (updateActive) {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TABS[i] === tab);
    });
  } else {
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', TABS[i] === tab);
    });
  }
}

const GITHUB_REPO = 'contentsTeamHaruna/haruna-daily-insights';
const CHANNELS_FILE = 'channels.json';

async function directSubmit() {
  let pat = localStorage.getItem('ep_github_pat') || '';
  if (!pat) {
    pat = prompt('GitHub PAT을 입력하세요 (최초 1회만 필요):', '') || '';
    if (!pat) { showToast('⚠️ PAT이 필요합니다'); return; }
    localStorage.setItem('ep_github_pat', pat);
  }

  const decisions = loadDecisions();
  const toAdd = SUGGESTIONS.filter(s => decisions[s.username] === 'added');
  const toDrop = new Set(SUGGESTIONS.filter(s => decisions[s.username] === 'dropped').map(s => s.username));

  if (!toAdd.length && !toDrop.size) { showToast('결정된 항목이 없습니다.'); return; }

  const btn = document.getElementById('applyBtn');
  btn.disabled = true;
  btn.textContent = '적용 중...';

  const today = new Date().toISOString().slice(0, 10);
  const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${CHANNELS_FILE}`;
  const headers = { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };

  try {
    // 최신 channels.json 읽기
    const getRes = await fetch(apiUrl, { headers });
    const getData = await getRes.json();
    if (!getData.sha) throw new Error(getData.message || 'channels.json 읽기 실패');
    const sha = getData.sha;
    const chData = JSON.parse(atob(getData.content.replace(/\n/g, '')));

    // 추가/제거 적용
    const existing = new Set(chData.channels.map(c => c.username));
    toAdd.forEach(s => {
      if (!existing.has(s.username)) {
        chData.channels.push({ username: s.username, category: s.category.split('/')[0], active: true });
      }
    });
    chData.channels = chData.channels.filter(c => !toDrop.has(c.username));
    chData.updated = today;

    // channels.json 즉시 업데이트
    const newContent = JSON.stringify(chData, null, 2);
    const putBody = { message: `채널 업데이트 ${today}`, content: btoa(unescape(encodeURIComponent(newContent))), sha };
    const putRes = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(putBody) });
    const putData = await putRes.json();

    if (putData.content) {
      const addedNames = toAdd.map(s => '@' + s.username).join(', ');
      const dropNames = [...toDrop].map(u => '@' + u).join(', ');
      const msg = [addedNames && `✅ 추가: ${addedNames}`, dropNames && `❌ 제거: ${dropNames}`].filter(Boolean).join(' / ');
      showToast(`${msg} — 즉시 반영됐습니다!`);
      localStorage.removeItem(STORAGE_KEY);
      renderAll();
    } else {
      if ((putData.message || '').toLowerCase().includes('bad credentials')) {
        localStorage.removeItem('ep_github_pat');
        showToast('❌ PAT 오류 — 다시 클릭하면 재입력할 수 있습니다.');
      } else {
        showToast('❌ 오류: ' + (putData.message || '알 수 없는 오류'));
      }
    }
  } catch (e) {
    showToast('❌ 네트워크 오류: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '📤 채널 목록 업데이트';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// Init
renderAll();
