        { date:'2026-04-08', file:'everypace_daily_20260408.html', highlights:['러닝 유행의 이유','배불뚝→슬림 변화','BMI의 진실'] },
        { date:'2026-04-07', file:'everypace_daily_20260407.html', highlights:['신발 정사이즈 오해','몽촌토성 런코스','수면과 염증 연결'] },
        { date:'2026-04-06', file:'everypace_daily_20260406.html', highlights:['이온음료 순위','런린이 탈출 선언','여성 염증 해법'] },
        // { date:'2026-04-06', file:'everypace_daily_20260406.html', highlights:['러닝 트렌드','마라톤 시즌'] }
      ]
    },
    // 콘텐츠 임팩트는 메타 광고 분석 페이지 내 섹션으로 통합됨
  };

  const DOW_KR=['일','월','화','수','목','금','토'];
  const MONTH_KR=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const todayStr=new Date().toISOString().slice(0,10);

  // Build tabs
  const tabsEl=document.getElementById('tabs');
  const keys=Object.keys(sections);
  let activeTab=keys[0];

  keys.forEach(key=>{
    const s=sections[key];
    const tab=document.createElement('div');
    tab.className='tab'+(key===activeTab?' active':'');
    tab.dataset.tab=key;
    tab.innerHTML=`<span class="tab-emoji">${s.emoji}</span>${s.name}<span class="tab-count">(${s.reports.length})</span>`;
    tab.onclick=()=>switchTab(key);
    tabsEl.appendChild(tab);
  });

  // Build panels
  const panelsEl=document.getElementById('panels');
  keys.forEach(key=>{
    const panel=document.createElement('div');
    panel.className='section-panel'+(key===activeTab?' active':'');
    panel.id='panel-'+key;
    panel.dataset.section=key;
    panelsEl.appendChild(panel);
    renderReports(key);
  });

  updateStats(activeTab);

  function switchTab(key){
    activeTab=key;
    document.querySelectorAll('.tab').forEach(t=>{t.classList.toggle('active',t.dataset.tab===key);});
    document.querySelectorAll('.section-panel').forEach(p=>{p.classList.toggle('active',p.id==='panel-'+key);});
    updateStats(key);
  }

  function updateStats(key){
    const reports=sections[key].reports;
    const sorted=[...reports].sort((a,b)=>b.date.localeCompare(a.date));
    let streak=0;
    if(sorted.length>0){streak=1;for(let i=1;i<sorted.length;i++){if((new Date(sorted[i-1].date)-new Date(sorted[i].date))/(86400000)===1)streak++;else break;}}
    const latest=sorted[0]?new Date(sorted[0].date):null;
    document.getElementById('statsBar').innerHTML=`
      <div class="stat-item"><div class="stat-number">${reports.length}</div><div class="stat-label">총 리포트</div></div>
      <div class="stat-item"><div class="stat-number">${latest?(latest.getMonth()+1)+'/'+latest.getDate():'-'}</div><div class="stat-label">최신 리포트</div></div>
      <div class="stat-item"><div class="stat-number">${streak}</div><div class="stat-label">연속 발행일</div></div>`;
  }

  function renderReports(key){
    const panel=document.getElementById('panel-'+key);
    const reports=sections[key].reports;
    if(reports.length===0){panel.innerHTML='<div class="empty-state"><div class="emoji">📭</div><p>아직 리포트가 없습니다.<br>매일 자동으로 생성됩니다.</p></div>';return;}
    const grouped={};
    reports.forEach(r=>{const d=new Date(r.date);const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(!grouped[k])grouped[k]=[];grouped[k].push(r);});
    Object.keys(grouped).sort().reverse().forEach(mk=>{
      const[y,m]=mk.split('-');
      const mg=document.createElement('div');mg.className='month-group';
      const t=document.createElement('div');t.className='month-title';t.textContent=y+'년 '+MONTH_KR[parseInt(m)-1];mg.appendChild(t);
      grouped[mk].sort((a,b)=>b.date.localeCompare(a.date)).forEach(r=>{
        const d=new Date(r.date),isToday=r.date===todayStr;
        const card=document.createElement('a');card.className='report-card'+(isToday?' today':'');card.href=r.file;
        card.innerHTML='<div class="card-date"><div class="day">'+d.getDate()+'</div><div class="dow">'+DOW_KR[d.getDay()]+'</div></div><div class="card-content"><div class="card-title">'+sections[key].name+' — '+d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0')+(isToday?' <span class="today-badge">TODAY</span>':'')+'</div><div class="card-meta">'+(r.weather?'<span class="card-tag weather">'+r.weather+'</span>':'')+(r.season?'<span class="card-tag season">'+r.season+'</span>':'')+(r.highlights||[]).slice(0,2).map(h=>'<span class="card-tag">'+h+'</span>').join('')+'</div></div><div class="card-arrow"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
        mg.appendChild(card);
      });
      panel.appendChild(mg);
    });
  }

})();
</script>
</body>
</html>
