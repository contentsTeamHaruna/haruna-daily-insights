  /* Empty State */

  /* Footer */

  /* Today highlight */

  .today-badge {

  @media (max-width: 600px) {

    .stat-number { font-size: 22px; }
    .report-card { padding: 16px 18px; gap: 14px; }
    .card-date { width: 48px; height: 48px; }
    .card-date .day { font-size: 18px; }
  }

</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-emoji">冒聼聯聤</div>
    <h1>毛聧掳矛聺录毛娄卢 矛聺赂矛聜卢矛聺麓铆聤赂 矛聲聞矛鹿麓矛聺麓毛赂聦</h1>
    <div class="subtitle">铆聲聵毛拢篓毛聜聵 毛掳聰毛聰聰铆聛卢毛娄录 芒聙聰 毛搂陇矛聺录矛聺聵 矛聥聹矛聻楼 矛聺赂矛聜卢矛聺麓铆聤赂毛楼录 铆聲聹毛聢聢矛聴聬</div>
    <span class="brand">haruna bodycare</span>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item">
      <div class="stat-number" id="totalCount">-</div>
      <div class="stat-label">矛麓聺 毛娄卢铆聫卢铆聤赂</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="latestDate">-</div>
      <div class="stat-label">矛碌聹矛聥聽 毛娄卢铆聫卢铆聤赂</div>
    </div>
    <div class="stat-item">
      <div class="stat-number" id="streakCount">-</div>
      <div class="stat-label">矛聴掳矛聠聧 毛掳聹铆聳聣矛聺录</div>
    </div>
  </div>

  <div id="reportList"></div>

  <div class="footer">
    <p>矛聻聬毛聫聶 矛聝聺矛聞卤 毛娄卢铆聫卢铆聤赂 芒聙聰 毛搂陇矛聺录 矛聵陇矛聽聞 矛聴聟毛聧掳矛聺麓铆聤赂</p>
  </div>

</div>

<script>
(function() {
  // ======================================================
  // 毛娄卢铆聫卢铆聤赂 毛陋漏毛隆聺: 矛聝聢 毛娄卢铆聫卢铆聤赂锚掳聙 矛聝聺矛聞卤毛聬聽 毛聲聦毛搂聢毛聥陇 矛聴卢锚赂掳矛聴聬 矛露聰锚掳聙毛聬漏毛聥聢毛聥陇.
  // ======================================================
  const reports = [
    {
      date: '2026-04-06',
      file: 'haruna_daily_insights_20260406.html',
      weather: '铆聺聬毛娄卢锚鲁聽 毛鹿聞',
      season: '毛麓聞 铆聶聵矛聽聢锚赂掳',
      highlights: ['矛聤陇铆聜陇毛聥聢铆聰录矛录聙矛聺麓矛聟聵 铆聤赂毛聽聦毛聯聹', 'PDRN 毛掳聰毛聰聰铆聛卢毛娄录 毛露聙矛聝聛', '锚赂掳铆聸聞 矛聽聛矛聺聭铆聵聲 毛路掳铆聥掳']
    }
    // 矛聝聢 毛娄卢铆聫卢铆聤赂 铆聲颅毛陋漏矛聺聙 矛聺麓 毛掳掳矛聴麓矛聴聬 矛露聰锚掳聙毛聬漏毛聥聢毛聥陇
    // {
    //   date: '2026-04-07',
    //   file: 'haruna_daily_insights_20260407.html',
    //   weather: '毛搂聭矛聺聦',
    //   season: '毛麓聞',
    //   highlights: ['铆聜陇矛聸聦毛聯聹1', '铆聜陇矛聸聦毛聯聹2']
    // }
  ];

  const DOW_KR = ['矛聺录', '矛聸聰', '铆聶聰', '矛聢聵', '毛陋漏', '锚赂聢', '铆聠聽'];
  const MONTH_KR = ['1矛聸聰', '2矛聸聰', '3矛聸聰', '4矛聸聰', '5矛聸聰', '6矛聸聰', '7矛聸聰', '8矛聸聰', '9矛聸聰', '10矛聸聰', '11矛聸聰', '12矛聸聰'];

  const todayStr = new Date().toISOString().slice(0, 10);

  // Stats
  document.getElementById('totalCount').textContent = reports.length;
  if (reports.length > 0) {
    const latest = new Date(reports[0].date);
    document.getElementById('latestDate').textContent =
      `${latest.getMonth()+1}/${latest.getDate()}`;
  }

  // Streak calculation
  let streak = 0;
  const sorted = [...reports].sort((a,b) => b.date.localeCompare(a.date));
  if (sorted.length > 0) {
    streak = 1;
    for (let i = 1; i < sorted.length; i++) {
      const prev = new Date(sorted[i-1].date);
      const curr = new Date(sorted[i].date);
      const diff = (prev - curr) / (1000 * 60 * 60 * 24);
      if (diff === 1) streak++;
      else break;
    }
  }
  document.getElementById('streakCount').textContent = streak;

  // Group by month
  const grouped = {};
  reports.forEach(r => {
    const d = new Date(r.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  const listEl = document.getElementById('reportList');

  // Sort months descending
  const monthKeys = Object.keys(grouped).sort().reverse();

  if (monthKeys.length === 0) {
    listEl.innerHTML = `
      <div class="empty-state">
        <div class="emoji">冒聼聯颅</div>
        <p>矛聲聞矛搂聛 毛娄卢铆聫卢铆聤赂锚掳聙 矛聴聠矛聤碌毛聥聢毛聥陇.<br>毛搂陇矛聺录 矛聲聞矛鹿篓 矛聻聬毛聫聶矛聹录毛隆聹 矛聝聺矛聞卤毛聬漏毛聥聢毛聥陇.</p>
      </div>`;
    return;
  }

  monthKeys.forEach(key => {
    const [y, m] = key.split('-');
    const monthGroup = document.createElement('div');
    monthGroup.className = 'month-group';

    const title = document.createElement('div');
    title.className = 'month-title';
    title.textContent = `${y}毛聟聞 ${MONTH_KR[parseInt(m)-1]}`;
    monthGroup.appendChild(title);

    // Sort dates descending within month
    const items = grouped[key].sort((a,b) => b.date.localeCompare(a.date));

    items.forEach(r => {
      const d = new Date(r.date);
      const isToday = r.date === todayStr;

      const card = document.createElement('a');
      card.className = 'report-card' + (isToday ? ' today' : '');
      card.href = r.file;

      card.innerHTML = `
        <div class="card-date">
          <div class="day">${d.getDate()}</div>
          <div class="dow">${DOW_KR[d.getDay()]}</div>
        </div>
        <div class="card-content">
          <div class="card-title">
            毛聧掳矛聺录毛娄卢 矛聺赂矛聜卢矛聺麓铆聤赂 芒聙聰 ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}
            ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
          </div>
          <div class="card-meta">
            ${r.weather ? `<span class="card-tag weather">${r.weather}</span>` : ''}
            ${r.season ? `<span class="card-tag season">${r.season}</span>` : ''}
            ${(r.highlights || []).slice(0,2).map(h => `<span class="card-tag">${h}</span>`).join('')}
          </div>
        </div>
        <div class="card-arrow">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 3L11 8L6 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      `;

      monthGroup.appendChild(card);
    });

    listEl.appendChild(monthGroup);
  });
})();
</script>

</body>
